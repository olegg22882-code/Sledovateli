<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>СУ СК РФ по Нижегородской области · г. Арзамас</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0b0e14;--panel:#141920;--panel-2:#1a2130;--panel-3:#1f2839;
  --line:#252e3d;--line-2:#2c3850;
  --gold:#c9a227;--gold-s:#e8cf7a;--gold-dim:rgba(201,162,39,.16);
  --gold-glow:rgba(201,162,39,.12);
  --navy:#3a5a8c;--teal:#2dd4bf;--teal-dim:rgba(45,212,191,.12);
  --text:#eae8e1;--text-dim:#6e7d94;--text-mid:#a8b5c6;
  --red:#9e2e2c;--red-dim:rgba(158,46,44,.14);
  --green:#3d7a50;--r:12px;
  --transition:.22s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;line-height:1.58;overflow-x:hidden;
  background-image:radial-gradient(ellipse 900px 500px at 10% 0%,rgba(58,90,140,.1),transparent),
                   radial-gradient(ellipse 700px 400px at 90% 20%,rgba(201,162,39,.05),transparent);
}
a{color:inherit;text-decoration:none;}
button,input,select,textarea{font-family:inherit;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;}
::selection{background:var(--gold-dim);color:var(--gold-s);}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:90;background:rgba(11,14,20,.94);backdrop-filter:blur(18px) saturate(160%);border-bottom:1px solid var(--line);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;max-width:1200px;margin:0 auto;gap:12px;}
.brandblock{display:flex;align-items:center;gap:11px;min-width:0;flex:1 1 auto;}
.hbadge{width:35px;height:35px;border-radius:50%;flex-shrink:0;background:conic-gradient(from 220deg,var(--gold),var(--navy),var(--gold));display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 2px var(--bg),0 0 12px rgba(201,162,39,.25);font-family:'Playfair Display';font-weight:800;font-size:12px;color:var(--bg);}
.brandtext .t1{font-family:'Playfair Display';font-weight:700;font-size:clamp(12px,3vw,14.5px);line-height:1.25;}
.brandtext .t2{font-size:clamp(9px,2.2vw,10.5px);color:var(--text-dim);letter-spacing:.3px;}
.game-tag{font-family:'JetBrains Mono';font-size:9px;color:var(--gold-s);border:1px solid rgba(201,162,39,.3);padding:3px 8px;border-radius:20px;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;display:none;background:var(--gold-glow);}
@media(min-width:760px){.game-tag{display:inline-block;}}
.right-hdr{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.auth-info{display:none;font-size:12px;color:var(--text-dim);}
.auth-info b{color:var(--gold-s);cursor:pointer;transition:opacity .15s;}
.auth-info b:hover{opacity:.8;}
@media(min-width:640px){.auth-info{display:inline;}}
.burger{display:flex;flex-direction:column;justify-content:center;gap:4px;width:35px;height:35px;border-radius:8px;border:1px solid var(--line);background:var(--panel-2);cursor:pointer;align-items:center;flex-shrink:0;transition:border-color var(--transition);}
.burger:hover{border-color:var(--gold);}
.burger span{width:14px;height:2px;background:var(--text-mid);border-radius:2px;transition:background var(--transition);}
.burger:hover span{background:var(--gold-s);}
@media(min-width:880px){.burger{display:none;}}
nav{display:flex;gap:1px;flex-wrap:wrap;padding:0 20px 8px;max-width:1200px;margin:0 auto;overflow-x:auto;}
@media(max-width:879px){
  nav{flex-direction:column;gap:0;max-height:0;overflow:hidden;padding:0 20px;transition:max-height .32s cubic-bezier(.4,0,.2,1),padding .32s ease;}
  nav.open{max-height:700px;padding:6px 20px 14px;}
  nav button{width:100%;text-align:left;border-radius:8px;border-bottom:none!important;padding:11px 12px;}
  nav button.active{background:var(--gold-dim);}
}
nav button{background:none;border:none;color:var(--text-dim);font-size:12.5px;font-weight:500;padding:7px 10px;cursor:pointer;border-radius:5px 5px 0 0;border-bottom:2px solid transparent;transition:color var(--transition),background var(--transition),border-color var(--transition);white-space:nowrap;}
nav button:hover{color:var(--text);background:rgba(255,255,255,.03);}
nav button.active{color:var(--gold-s);border-bottom-color:var(--gold);}
nav button.locked::after{content:" 🔒";font-size:9px;}

/* ── BUTTONS ── */
.btn{font-weight:600;font-size:13px;padding:9px 16px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--panel-2);color:var(--text);transition:all var(--transition);user-select:none;}
.btn:hover{border-color:var(--gold);color:var(--gold-s);background:var(--gold-glow);}
.btn:active{transform:scale(.97);}
.btn.primary{background:linear-gradient(135deg,var(--gold) 0%,#9e7b19 100%);color:#110d00;border:none;font-size:13.5px;box-shadow:0 4px 14px rgba(201,162,39,.25);}
.btn.primary:hover{filter:brightness(1.08);box-shadow:0 6px 20px rgba(201,162,39,.35);}
.btn.danger{border-color:rgba(158,46,44,.5);color:#e79b99;}
.btn.danger:hover{background:var(--red-dim);border-color:var(--red);}
.btn.sm{padding:6px 12px;font-size:12px;}
.btn.wf{width:100%;}
.btn.ghost{background:transparent;border-color:transparent;color:var(--text-dim);padding:6px 10px;}
.btn.ghost:hover{color:var(--gold-s);background:var(--gold-dim);border-color:transparent;}

/* ── LAYOUT ── */
section.sec{max-width:1200px;margin:0 auto;padding:36px 20px;}
.section-head{margin-bottom:28px;}
.eyebrow{font-family:'JetBrains Mono';font-size:10px;color:var(--gold-s);letter-spacing:2px;text-transform:uppercase;}
.section-title{font-family:'Playfair Display';font-weight:800;font-size:clamp(22px,4vw,32px);margin-top:6px;line-height:1.18;letter-spacing:-.3px;}
.section-sub{color:var(--text-dim);font-size:13.5px;margin-top:8px;max-width:620px;line-height:1.65;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;transition:border-color var(--transition);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:780px){.g2,.g3{grid-template-columns:1fr;}}
.divider{height:1px;background:var(--line);margin:20px 0;}
.lift{transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;}
.lift:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(0,0,0,.4);border-color:var(--line-2);}

/* ── HERO ── */
.hero{max-width:1200px;margin:0 auto;padding:56px 20px 48px;display:grid;grid-template-columns:1.3fr 1fr;gap:40px;align-items:center;}
@media(max-width:820px){.hero{grid-template-columns:1fr;padding:40px 20px 32px;}}
.hero .kicker{font-family:'JetBrains Mono';font-size:10.5px;color:var(--gold-s);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:14px;display:block;}
.hero h1{font-family:'Playfair Display';font-weight:800;font-size:clamp(28px,5vw,46px);line-height:1.1;margin-bottom:16px;letter-spacing:-.5px;}
.hero h1 span{color:var(--gold-s);}
.hero p{color:var(--text-dim);font-size:15px;max-width:490px;margin-bottom:26px;line-height:1.7;}
.hero .hbtns{display:flex;gap:12px;flex-wrap:wrap;}
.seal{justify-self:center;width:min(220px,58vw);height:min(220px,58vw);border-radius:50%;border:1.5px solid var(--gold);position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(201,162,39,.07),transparent 70%);box-shadow:0 0 60px rgba(201,162,39,.08),inset 0 0 40px rgba(201,162,39,.04);}
.seal::before{content:"";position:absolute;inset:11px;border:1px solid rgba(201,162,39,.3);border-radius:50%;}
.seal .inner{text-align:center;font-family:'Playfair Display';font-weight:700;padding:0 12px;}
.seal .inner .s1{font-size:20px;letter-spacing:1.5px;color:var(--gold-s);}
.seal .inner .s2{font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono';margin-top:10px;letter-spacing:.5px;line-height:1.8;}

/* ── FORMS ── */
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10.5px;color:var(--text-dim);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;font-weight:500;}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 13px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:13.5px;transition:border-color var(--transition),box-shadow var(--transition);}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.1);}
.fg select option{background:var(--panel-2);}
.fhint{font-size:11px;color:var(--text-dim);margin:-8px 0 12px;line-height:1.5;}
.seg{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.seg button{flex:1;min-width:88px;padding:9px 10px;border-radius:8px;border:1px solid var(--line);background:var(--panel-2);color:var(--text-dim);font-size:12px;cursor:pointer;transition:all var(--transition);}
.seg button:hover{border-color:var(--line-2);color:var(--text);}
.seg button.active{border-color:var(--gold);color:var(--gold-s);background:var(--gold-dim);}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;line-height:1.5;}
.msg.err{background:var(--red-dim);border:1px solid rgba(158,46,44,.4);color:#e9a8a6;}
.msg.ok{background:rgba(61,122,80,.14);border:1px solid rgba(61,122,80,.4);color:#9fd6ae;}

/* ── STAFF ── */
.dept-block{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;transition:border-color var(--transition);}
.dept-block:hover{border-color:var(--line-2);}
.dept-block h3{font-family:'Playfair Display';font-weight:700;font-size:15.5px;margin:4px 0 0;}
.dept-tag-lbl{font-family:'JetBrains Mono';font-size:9.5px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid var(--line);margin-top:12px;gap:8px;flex-wrap:wrap;}
.s-row:first-of-type{margin-top:14px;}
.s-name{font-weight:600;font-size:13.5px;cursor:pointer;transition:color var(--transition);}
.s-name:hover{color:var(--gold-s);}
.s-rank{font-size:11px;color:var(--gold-s);font-family:'JetBrains Mono';}
.s-medals{display:flex;gap:3px;margin-top:3px;}
.s-medals span{font-size:12px;}
.vacant-tag{margin-top:14px;padding:11px 14px;border-radius:8px;border:1px dashed var(--line);font-size:13px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}

/* ── FORMER ── */
.former-item{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;opacity:.82;transition:opacity var(--transition);}
.former-item:hover{opacity:1;}
.former-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.former-name{font-family:'Playfair Display';font-weight:700;font-size:15px;}
.former-meta{font-size:11.5px;color:var(--text-dim);margin-top:2px;}
.reason-pill{font-size:11px;padding:5px 11px;border-radius:16px;font-weight:600;white-space:nowrap;}
.reason-pill.voluntary{background:rgba(110,125,148,.14);color:var(--text-mid);border:1px solid var(--line);}
.reason-pill.forced{background:var(--red-dim);color:#e79b99;border:1px solid rgba(158,46,44,.35);}
.former-date{font-family:'JetBrains Mono';font-size:10px;color:var(--text-dim);margin-top:8px;}

/* ── NEWS ── */
.news-item{padding:20px 0;border-bottom:1px solid var(--line);transition:opacity var(--transition);}
.news-item:last-child{border-bottom:none;}
.news-date{font-family:'JetBrains Mono';font-size:10px;color:var(--text-dim);}
.news-item h4{font-size:15.5px;margin:6px 0 8px;font-family:'Playfair Display';font-weight:700;line-height:1.3;}
.news-item p{font-size:13px;color:var(--text-mid);line-height:1.68;}
.item-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:10px;}

/* ── REACTIONS ── */
.reactions{display:flex;gap:6px;flex-wrap:wrap;}
.rbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:var(--panel-2);color:var(--text-dim);font-size:13px;cursor:pointer;transition:all var(--transition);}
.rbtn:hover{border-color:var(--gold);color:var(--gold-s);}
.rbtn.mine{border-color:var(--gold);color:var(--gold-s);background:var(--gold-dim);}
.rbtn .rc{font-family:'JetBrains Mono';font-size:10px;}

/* ── DOCS ── */
.doc-item{padding:16px 18px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;background:var(--panel-2);position:relative;transition:border-color var(--transition);}
.doc-item:hover{border-color:var(--line-2);}
.doc-stamp{position:absolute;top:13px;right:13px;font-family:'JetBrains Mono';font-size:8.5px;color:var(--red);border:1px solid rgba(158,46,44,.6);padding:2px 7px;border-radius:4px;letter-spacing:1.2px;transform:rotate(3deg);}
.doc-title{font-weight:700;font-size:14px;margin-bottom:4px;padding-right:90px;line-height:1.4;}
.doc-meta{font-family:'JetBrains Mono';font-size:10px;color:var(--text-dim);margin-bottom:10px;}
.doc-body{font-size:13px;color:var(--text-mid);white-space:pre-wrap;line-height:1.68;}
.doc-item img{max-width:100%;border-radius:8px;margin-bottom:8px;display:block;border:1px solid var(--line);}
.doc-link{font-size:13px;color:var(--gold-s);word-break:break-all;display:inline-block;}

/* ── CASES ── */
.case-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:16px;transition:border-color var(--transition),box-shadow var(--transition);}
.case-card:hover{border-color:var(--line-2);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.case-topline{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap;}
.status-pill.investigation{background:rgba(61,122,80,.16);color:#8fd6a3;border:1px solid rgba(61,122,80,.4);}
.status-pill.closed{background:rgba(110,125,148,.14);color:var(--text-mid);border:1px solid var(--line);}
.case-title{font-size:14px;font-weight:600;color:var(--text);flex:1;}
.case-meta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.case-ts{font-family:'JetBrains Mono';font-size:10px;color:var(--text-dim);}
.case-idx{color:var(--gold-s);}
.case-heading{font-family:'Playfair Display';font-weight:800;font-size:16px;letter-spacing:.3px;margin-bottom:12px;color:var(--text);}
.case-field{font-size:13px;color:var(--text-mid);margin-bottom:7px;line-height:1.65;}
.case-field b{color:var(--text);font-weight:600;}

/* ── CHAT ── */
.chat-layout{display:grid;grid-template-columns:190px 1fr;gap:16px;align-items:start;}
@media(max-width:680px){.chat-layout{grid-template-columns:1fr;}}
.chat-sidebar h4{font-family:'JetBrains Mono';font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.online-list{display:flex;flex-direction:column;gap:5px;}
.online-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;background:var(--panel-2);border:1px solid var(--line);transition:all var(--transition);}
.online-item:hover{border-color:var(--gold);background:var(--gold-glow);}
.online-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-box{height:min(420px,58vh);overflow-y:auto;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.c-msg{max-width:78%;animation:msgIn .2s ease;}
.c-msg.own{align-self:flex-end;}
@keyframes msgIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.c-author{font-family:'JetBrains Mono';font-size:10px;margin-bottom:3px;color:var(--text-dim);display:flex;align-items:center;gap:6px;cursor:pointer;}
.c-author:hover{text-decoration:underline;}
.c-author.leader{color:var(--gold-s);}
.c-author.investigator,.c-author.admin{color:#8fb3e8;}
.c-bubble{background:var(--panel-3);border:1px solid var(--line);padding:9px 13px;border-radius:10px;font-size:13px;line-height:1.58;word-break:break-word;}
.c-msg.own .c-bubble{background:linear-gradient(135deg,rgba(58,90,140,.3),rgba(26,42,70,.55));border-color:rgba(58,90,140,.45);}
.c-ts{font-family:'JetBrains Mono';font-size:9px;color:var(--text-dim);margin-top:3px;text-align:right;}
.chat-typing-area{margin-top:10px;border:1px solid var(--line);border-radius:10px;background:var(--panel-2);overflow:hidden;transition:border-color var(--transition);}
.chat-typing-area:focus-within{border-color:var(--gold);}
.mention-suggest-box{display:none;flex-wrap:wrap;gap:5px;padding:8px 12px;border-bottom:1px solid var(--line);}
.msug{padding:4px 10px;border-radius:14px;border:1px solid var(--line);background:var(--panel-3);color:var(--gold-s);font-size:11.5px;cursor:pointer;transition:border-color var(--transition);}
.msug:hover{border-color:var(--gold);}
.chat-input-row{display:flex;}
.chat-input-row input{flex:1;padding:13px 14px;background:transparent;border:none;color:var(--text);font-size:13.5px;outline:none;}
.chat-input-row button{padding:12px 18px;border:none;background:transparent;color:var(--gold-s);font-size:13px;cursor:pointer;font-weight:600;transition:color var(--transition);}
.chat-input-row button:hover{color:var(--gold);}

/* ── MENTIONS ── */
.mention{color:var(--gold-s);font-weight:600;cursor:pointer;transition:opacity var(--transition);}
.mention:hover{opacity:.75;text-decoration:underline;}
.clickable{cursor:pointer;}

/* ── AVATARS ── */
.mini-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:800;flex-shrink:0;}
.mini-av.leader{background:linear-gradient(135deg,var(--gold),#7a5e0e);color:#1a1203;}
.mini-av.investigator{background:linear-gradient(135deg,#4a72aa,#1e3562);color:#e8f0fc;}
.mini-av.admin{background:linear-gradient(135deg,#4a8a67,#1e4030);color:#d8f5e8;}
img.mini-av{object-fit:cover;border:1.5px solid var(--line);}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(6,9,14,.78);backdrop-filter:blur(8px);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;animation:moIn .2s ease;}
@keyframes moIn{from{opacity:0;}to{opacity:1;}}
.mc{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px 22px 24px;max-width:360px;width:100%;position:relative;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.65);max-height:90vh;overflow-y:auto;animation:mcIn .24s cubic-bezier(.2,.8,.2,1);}
@keyframes mcIn{from{opacity:0;transform:translateY(12px) scale(.96);}to{opacity:1;transform:none;}}
.mc-close{position:absolute;top:12px;right:12px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;width:30px;height:30px;color:var(--text-dim);cursor:pointer;font-size:13px;transition:all var(--transition);}
.mc-close:hover{color:var(--gold-s);border-color:var(--gold);}
.av-wrap{display:flex;justify-content:center;margin-bottom:10px;}
.p-name{font-family:'Playfair Display';font-weight:800;font-size:18px;margin-bottom:2px;}
.p-pos{font-size:11.5px;color:var(--text-dim);margin-bottom:12px;line-height:1.5;}
.p-service{font-family:'JetBrains Mono';font-size:10px;color:var(--text-dim);margin-bottom:14px;}
.badge-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.bpill{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;font-size:11.5px;font-weight:600;}
.bpill.sm{padding:4px 10px;font-size:10.5px;}
.bpill.leader{background:rgba(201,162,39,.15);color:var(--gold-s);border:1px solid rgba(201,162,39,.35);}
.bpill.investigator{background:rgba(58,90,140,.2);color:#9ec1f0;border:1px solid rgba(58,90,140,.42);}

<script>
/* ═══════════════════════════════════════════════════════════
   ХРАНИЛИЩЕ — localStorage (работает в любом браузере,
   данные сохраняются навсегда между перезагрузками)
   ═══════════════════════════════════════════════════════════ */
const LS_KEY = 'sk_nn_state_v3';
const LS_SES = 'sk_nn_session_v3';

function lsGet(key){
  try{ const v=localStorage.getItem(key); return v?JSON.parse(v):null; }catch(e){ return null; }
}
function lsSet(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); return true; }
  catch(e){ console.error('localStorage full or blocked', e); return false; }
}

function saveState(){ lsSet(LS_KEY, STATE); }
function saveSession(){ lsSet(LS_SES, session); }

/* ═══════════════════════════════════════════════════════════
   СИСТЕМНЫЕ ПОЛЬЗОВАТЕЛИ (всегда есть, пароли не хранятся в LS)
   ═══════════════════════════════════════════════════════════ */
const SYS = {
  'Alexander_Bastrykin': {password:'01372', role:'leader', name:'Александр Бастрыкин', rank:'полковник юстиции', position:'Руководитель СУ СК РФ по Нижегородской области', dept:'РУК', joinDate:'01.01.2026'},
  'Tom_Molodoy':         {password:'5670',  role:'investigator', name:'Том Молодой', rank:'старший лейтенант юстиции', position:'следователь-инструктор', dept:'ВСО', joinDate:'25.06.2026'},
  'Alexander_Sidorov':   {password:'24519', role:'investigator', name:'Александр Сидоров', rank:'младший лейтенант юстиции', position:'следователь', dept:'ВСО', joinDate:'25.06.2026'},
};

const MEDALS = [
  {key:'sluzhba', icon:'🎖️', label:'За отличную службу'},
  {key:'delo',    icon:'⭐',  label:'Раскрытое дело'},
  {key:'veteran', icon:'🛡️', label:'Ветеран отдела'},
  {key:'doverie', icon:'🏆', label:'Доверие руководства'},
];

/* ═══════════════════════════════════════════════════════════
   СОСТОЯНИЕ
   ═══════════════════════════════════════════════════════════ */
const DEFAULT_STATE = ()=>({
  users:{},
  departments:[
    {name:'Отдел по расследованию особо важных дел (ОВД)', tag:'ОВД', staff:[]},
    {name:'Военно-следственный отдел', tag:'ВСО', staff:['Tom_Molodoy','Alexander_Sidorov']},
    {name:'Арзамасский межрайонный следственный отдел (АМСО)', tag:'АМСО', staff:[]},
    {name:'Криминалистика', tag:'ЭКЦ', staff:[]},
  ],
  formerStaff:[],
  news:[
    {id:1, date:'01.07.2026', title:'Открыт набор в Отдел по расследованию особо важных дел', body:'ОВД временно пуст — приглашаем кандидатов с опытом оформления процессуальных документов.', reactions:{'👍':0,'🔥':0,'❤️':0}, reactedBy:{}},
    {id:2, date:'28.06.2026', title:'Пополнение военно-следственного отдела', body:'К личному составу присоединились следователь-инструктор @Tom_Molodoy и следователь @Alexander_Sidorov. Поздравляем с назначением.', reactions:{'👍':0,'🔥':0,'❤️':0}, reactedBy:{}},
  ],
  documents:[
    {id:3, date:'25.06.2026', num:'№ 001-ОРД', title:'О назначении личного состава военно-следственного отдела', type:'text', body:'Назначить следователя-инструктора @Tom_Molodoy и следователя @Alexander_Sidorov в военно-следственный отдел с текущей даты.', image:null, link:null, reactions:{'👍':0,'🔥':0,'❤️':0}, reactedBy:{}},
  ],
  chat:[], cases:[], caseSeq:0, idSeq:10,
});

let STATE = lsGet(LS_KEY) || DEFAULT_STATE();

// Миграция / добавление недостающих полей
if(!STATE.departments||!STATE.departments.length) STATE.departments=DEFAULT_STATE().departments;
if(!STATE.users) STATE.users={};
if(!STATE.formerStaff) STATE.formerStaff=[];
if(!STATE.news||!STATE.news.length) STATE.news=DEFAULT_STATE().news;
if(!STATE.documents) STATE.documents=[];
if(!STATE.chat) STATE.chat=[];
if(!STATE.cases) STATE.cases=[];
if(!STATE.caseSeq) STATE.caseSeq=0;
if(!STATE.idSeq) STATE.idSeq=10;

// Нормализуем медали: должны быть объектами {key, comment, date}
function normMedals(arr){ return (arr||[]).map(m=>typeof m==='string'?{key:m,comment:'',date:''}:m); }
Object.values(STATE.users).forEach(u=>{ u.medals=normMedals(u.medals); });
STATE.formerStaff.forEach(f=>{ f.medals=normMedals(f.medals); });

let session = lsGet(LS_SES)||{user:null};
// Проверяем что юзер из сессии ещё существует
if(session.user && !resolveUser(session.user)) session.user=null;

/* guestKey — для реакций без входа */
const GK = 'sk_nn_gid';
let guestKey = localStorage.getItem(GK);
if(!guestKey){ guestKey='g_'+Math.random().toString(36).slice(2); localStorage.setItem(GK,guestKey); }

/* UI state */
let activeTab = 'home';
let profileModalUser = null;
let pendingDismiss = null;
let editingKadr = false;
let editingQuote = false;
let editingContact = false;
let pendingMedalKey = null;
let pendingDelete = new Set();
let newDocType = 'text';

/* ═══════════════════════════════════════════════════════════
   УТИЛИТЫ
   ═══════════════════════════════════════════════════════════ */
function resolveUser(login){
  if(!login) return null;
  if(SYS[login]){
    const base=SYS[login], ov=STATE.users[login]||{};
    return {password:base.password, role:base.role,
      name:ov.name||base.name, rank:ov.rank||base.rank, position:ov.position||base.position,
      dept:ov.dept!==undefined?ov.dept:base.dept, medals:normMedals(ov.medals),
      avatar:ov.avatar||null, quote:ov.quote||'', contact:ov.contact||'',
      joinDate:ov.joinDate||base.joinDate||null};
  }
  const u=STATE.users[login]; if(!u) return null;
  return {...u, medals:normMedals(u.medals)};
}
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function mid(){ return ++STATE.idSeq; }
function nowDate(){ return new Date().toLocaleDateString('ru-RU'); }
function nowTs(){ return new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
function roleLabel(r){ return r==='leader'?'Руководитель':r==='admin'?'Администратор':'Следователь'; }
function roleIcon(r){ return r==='leader'?'👑':r==='admin'?'🛠️':'🕵️'; }
function currentRole(){ const u=resolveUser(session.user); return u?u.role:null; }
function deptLabel(u){
  const d=STATE.departments.find(x=>x.tag===u.dept);
  if(d) return d.name;
  return u.role==='leader'?'Руководство':'Без отдела';
}
function pluralRu(n,f){ const a=Math.abs(n)%100,n1=a%10; if(a>10&&a<20)return f[2]; if(n1>1&&n1<5)return f[1]; if(n1===1)return f[0]; return f[2]; }
function serviceLength(s){
  if(!s) return '—';
  const p=s.split('.'); if(p.length!==3) return '—';
  const d=new Date(+p[2],+p[1]-1,+p[0]); if(isNaN(d.getTime())) return '—';
  let months=(new Date().getFullYear()-d.getFullYear())*12+(new Date().getMonth()-d.getMonth());
  if(new Date().getDate()<d.getDate()) months--;
  if(months<0) months=0;
  if(months<1){ const days=Math.max(0,Math.floor((new Date()-d)/86400000)); return days<=0?'первый день':days+' '+pluralRu(days,['день','дня','дней']); }
  const years=Math.floor(months/12),remM=months%12;
  return (years>0?years+' '+pluralRu(years,['год','года','лет'])+' ':'')+
    (remM>0||years===0?remM+' '+pluralRu(remM,['месяц','месяца','месяцев']):'');
}
function allLogins(){ return [...Object.keys(SYS),...Object.keys(STATE.users)].filter((v,i,a)=>a.indexOf(v)===i); }
function caseStats(login){ return {closed:STATE.cases.filter(c=>c.assignedTo===login&&c.status==='closed').length, inProg:STATE.cases.filter(c=>c.assignedTo===login&&c.status==='investigation').length}; }

function mentionify(text){
  return esc(text).replace(/@([A-Za-z0-9_]+)/g,(m,u)=>{
    return resolveUser(u)?`<span class="mention" data-u="${u}">@${esc(u)}</span>`:m;
  });
}
function avatarHtml(u,size){
  if(u.avatar) return `<img class="mini-av" src="${u.avatar}" style="width:${size}px;height:${size}px;" alt="">`;
  const cls=u.role==='leader'?'leader':u.role==='admin'?'admin':'investigator';
  return `<div class="mini-av ${cls}" style="width:${size}px;height:${size}px;font-size:${Math.round(size*.42)}px;">${esc((u.name.trim()[0]||'?').toUpperCase())}</div>`;
}
function resizeImg(file,maxDim,q){
  return new Promise((res,rej)=>{
    const r=new FileReader(); r.onerror=rej;
    r.onload=e=>{ const img=new Image(); img.onerror=rej;
      img.onload=()=>{ let w=img.width,h=img.height;
        if(w>h){if(w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}}else{if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}}
        const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',q));
      }; img.src=e.target.result;
    }; r.readAsDataURL(file);
  });
}

/* ═══════════════════════════════════════════════════════════
   НАВИГАЦИЯ
   ═══════════════════════════════════════════════════════════ */
const TABS_PUBLIC=[
  {id:'home',label:'Главная'},{id:'join',label:'Как вступить'},
  {id:'staff',label:'Наш состав'},{id:'dossier',label:'Досье сотрудников'},
  {id:'former',label:'Бывшие следователи'},{id:'news',label:'Новости'},
  {id:'docs',label:'Документооборот'},{id:'cases',label:'Реестр дел'},
  {id:'perks',label:'Плюшки'},
];
function tabsForUser(){
  const tabs=[...TABS_PUBLIC];
  if(session.user){ tabs.push({id:'chat',label:'Чат',locked:true}); if(currentRole()==='leader') tabs.push({id:'panel',label:'Панель управления',locked:true}); }
  return tabs;
}
function renderNav(){
  const nav=document.getElementById('nav'); const open=nav.classList.contains('open');
  nav.innerHTML='';
  tabsForUser().forEach(t=>{
    const b=document.createElement('button'); b.textContent=t.label;
    b.className=(t.id===activeTab?'active ':'')+(t.locked?'locked':'');
    b.onclick=()=>{ activeTab=t.id; nav.classList.remove('open'); renderAll(); window.scrollTo({top:0,behavior:'smooth'}); };
    nav.appendChild(b);
  });
  if(open) nav.classList.add('open');
}
function renderHeader(){
  const info=document.getElementById('authInfo'),box=document.getElementById('authBtnBox');
  if(session.user){
    const u=resolveUser(session.user);
    info.innerHTML=`Вошли как <b id="sLink">${esc(u.name)}</b>`;
    const sl=document.getElementById('sLink'); if(sl) sl.onclick=()=>openProfile(session.user);
    box.innerHTML=`<button class="btn sm danger" id="logoutBtn">Выйти</button>`;
    document.getElementById('logoutBtn').onclick=()=>{ session.user=null; saveSession(); activeTab='home'; renderAll(); };
  } else {
    info.innerHTML='';
    box.innerHTML=`<button class="btn primary sm" id="loginBtn">Войти</button>`;
    document.getElementById('loginBtn').onclick=()=>{ activeTab='auth'; renderAll(); };
  }
}
document.getElementById('burgerBtn').onclick=()=>document.getElementById('nav').classList.toggle('open');
document.addEventListener('click',e=>{
  const el=e.target.closest('.mention,.clickable[data-u]');
  if(el&&el.dataset.u) openProfile(el.dataset.u);
});
function renderAll(){
  renderNav(); renderHeader();
  const main=document.getElementById('main'); main.innerHTML='';
  const map={home:rHome,join:rJoin,staff:rStaff,dossier:rDossier,former:rFormer,news:rNews,perks:rPerks,auth:rAuth,chat:rChat,docs:rDocs,cases:rCases,panel:rPanel};
  main.appendChild((map[activeTab]||rHome)());
  updateModal();
}

/* ═══════════════════════════════════════════════════════════
   СТРАНИЦЫ
   ═══════════════════════════════════════════════════════════ */

/* ГЛАВНАЯ */
function rHome(){
  const w=document.createElement('div');
  let best=null,bestC=0;
  allLogins().forEach(l=>{ const u=resolveUser(l); if(u&&u.medals.length>bestC){bestC=u.medals.length;best={l,u};} });
  w.innerHTML=`<div class="hero">
    <div>
      <span class="kicker">СУ СК РФ · г. Арзамас · Нижегородская область</span>
      <h1>Служба, где ценят<br><span>дело</span>, а не слова.</h1>
      <p>Официальный внутренний портал подразделения игрового проекта LIVE RUSSIA. Следователи, документооборот, реестр дел и служебный чат.</p>
      <div class="hbtns"><button class="btn primary" onclick="activeTab='join';renderAll();">Как вступить</button><button class="btn" onclick="activeTab='staff';renderAll();">Наш состав</button></div>
    </div>
    <div class="seal"><div class="inner"><div class="s1">СУ СК РФ</div><div class="s2">г. Арзамас<br>Нижегородская область</div></div></div>
  </div>
  <section class="sec" style="padding-top:0;">
    <div class="section-head"><span class="eyebrow">Обзор</span><div class="section-title">Состояние подразделения</div></div>
    <div class="g3">
      <div class="perk lift"><div class="ico">🕵️</div><h4>Военно-следственный отдел</h4><p>2 следователя несут службу.</p></div>
      <div class="perk lift"><div class="ico">📂</div><h4>ОВД · АМСО · Криминалистика</h4><p>Вакантны — ведётся набор кандидатов.</p></div>
      <div class="perk lift"><div class="ico">📁</div><h4>Реестр дел</h4><p>${STATE.cases.length} дел зарегистрировано.</p></div>

/* ═══════════════════════════════════════════════════════════
   ОБЩИЕ КОМПОНЕНТЫ
   ═══════════════════════════════════════════════════════════ */
function buildReactions(item,onSave){
  const bar=document.createElement('div'); bar.className='reactions';
  const key=session.user||guestKey;
  Object.keys(item.reactions).forEach(emoji=>{
    const btn=document.createElement('button'); const mine=item.reactedBy[key]===emoji;
    btn.className='rbtn'+(mine?' mine':'');
    btn.innerHTML=`<span>${emoji}</span><span class="rc">${item.reactions[emoji]}</span>`;
    btn.onclick=()=>{ const prev=item.reactedBy[key];
      if(prev===emoji){item.reactions[emoji]--;delete item.reactedBy[key];}
      else{if(prev)item.reactions[prev]--;item.reactions[emoji]++;item.reactedBy[key]=emoji;}
      onSave();
      // Обновляем кнопки без полного перерендера
      btn.className='rbtn'+(item.reactedBy[key]===emoji?' mine':'');
      bar.querySelectorAll('.rbtn').forEach((b,i)=>{ const em=Object.keys(item.reactions)[i]; if(em){ b.className='rbtn'+(item.reactedBy[key]===em?' mine':''); b.querySelector('.rc').textContent=item.reactions[em]; } });
    };
    bar.appendChild(btn);
  });
  return bar;
}
function buildDel(kind,id,onConfirm,redraw){
  const key=kind+':'+id; const span=document.createElement('span');
  if(pendingDelete.has(key)){
    span.innerHTML=`<button class="btn sm danger" data-y>Подтвердить удаление</button> <button class="btn sm" data-n>Отмена</button>`;
    span.querySelector('[data-y]').onclick=()=>{pendingDelete.delete(key);onConfirm();};
    span.querySelector('[data-n]').onclick=()=>{pendingDelete.delete(key);redraw();};
  } else {
    span.innerHTML=`<button class="btn sm ghost" data-d>🗑</button>`;
    span.querySelector('[data-d]').onclick=()=>{pendingDelete.add(key);redraw();};
  }
  return span;
}

function openProfile(uname){

}
function closeProfile(){ profileModalUser=null; updateModal(); }

function dismissStaff(uname,reason){
  const u=resolveUser(uname); if(!u) return;
  const dept=STATE.departments.find(d=>d.tag===u.dept);
  STATE.formerStaff.unshift({name:u.name,rank:u.rank,position:u.position,deptName:dept?dept.name:'Без отдела',medals:[...u.medals],reason,date:nowDate()});
  if(dept) dept.staff=dept.staff.filter(x=>x!==uname);
  delete STATE.users[uname];
  if(session.user===uname){session.user=null;saveSession();}
  saveState(); closeProfile(); renderAll();
}

  document.getElementById('mO').addEventListener('click',e=>{ if(e.target.id==='mO') closeProfile(); });

  if(canAvatar){
    document.getElementById('avBtn').onclick=()=>document.getElementById('avInp').click();
    document.getElementById('avInp').onchange=async(e)=>{ const f=e.target.files[0]; if(!f) return;
      try{ const d=await resizeImg(f,260,.82); if(!STATE.users[uname]) STATE.users[uname]={}; STATE.users[uname].avatar=d; saveState(); renderAll(); }catch(e){} };
  }
  if(canKadr){
    if(editingKadr){
      document.getElementById('ekS').onclick=()=>{ if(!STATE.users[uname]) STATE.users[uname]={}; STATE.users[uname].rank=document.getElementById('ekR').value.trim(); STATE.users[uname].position=document.getElementById('ekP').value.trim(); STATE.users[uname].joinDate=document.getElementById('ekJ').value.trim(); editingKadr=false; saveState(); renderAll(); };
      document.getElementById('ekC').onclick=()=>{ editingKadr=false; updateModal(); };
    } else document.getElementById('ekE').onclick=()=>{ editingKadr=true; updateModal(); };
  }
  if(canQuote){
    if(editingQuote){
      document.getElementById('eqS').onclick=()=>{ if(!STATE.users[uname]) STATE.users[uname]={}; STATE.users[uname].quote=document.getElementById('eqT').value.trim(); editingQuote=false; saveState(); renderAll(); };
      document.getElementById('eqC').onclick=()=>{ editingQuote=false; updateModal(); };
    } else if(document.getElementById('eqE')) document.getElementById('eqE').onclick=()=>{ editingQuote=true; updateModal(); };
  }
  if(canContact){
    if(editingContact){
      document.getElementById('ecS').onclick=()=>{ if(!STATE.users[uname]) STATE.users[uname]={}; STATE.users[uname].contact=document.getElementById('ecT').value.trim(); editingContact=false; saveState(); renderAll(); };
      document.getElementById('ecC').onclick=()=>{ editingContact=false; updateModal(); };
    } else if(document.getElementById('ecE')) document.getElementById('ecE').onclick=()=>{ editingContact=true; updateModal(); };
  }
  if(canMedals){
    document.querySelectorAll('#mToggles .mt').forEach(btn=>{
      btn.onclick=()=>{ const k=btn.dataset.k; if(!STATE.users[uname]) STATE.users[uname]={}; if(!STATE.users[uname].medals) STATE.users[uname].medals=[...u.medals];
        const idx=STATE.users[uname].medals.findIndex(x=>x.key===k);
        if(idx>=0){ STATE.users[uname].medals.splice(idx,1); saveState(); renderAll(); }
        else { pendingMedalKey=k; updateModal(); }
      };
    });
    if(pendingMedalKey){
      document.getElementById('mConf').onclick=()=>{ const com=document.getElementById('mCom').value.trim(); if(!STATE.users[uname]) STATE.users[uname]={}; if(!STATE.users[uname].medals) STATE.users[uname].medals=[...u.medals]; STATE.users[uname].medals.push({key:pendingMedalKey,comment:com,date:nowDate()}); pendingMedalKey=null; saveState(); renderAll(); };
      document.getElementById('mCan').onclick=()=>{ pendingMedalKey=null; updateModal(); };
    }
  }
  if(canDismiss){
    if(pendingDismiss){ document.getElementById('dYes').onclick=()=>dismissStaff(uname,pendingDismiss); document.getElementById('dNo').onclick=()=>{pendingDismiss=null;updateModal();}; }
    else{ document.getElementById('dVol').onclick=()=>{pendingDismiss='voluntary';updateModal();}; document.getElementById('dFrc').onclick=()=>{pendingDismiss='forced';updateModal();}; }
  }
}

/* ═══════════════════════════════════════════════════════════
   СТАРТ
   ═══════════════════════════════════════════════════════════ */
renderAll();
</script>
</body>
</html>
